# ============================================================
# IoC フィードマニフェスト
# ============================================================
# このファイルは `gui/feed_fetcher.py` が読み、宣言された各フィードを
# 取得・正規化して `lookups/<output>` に保存する。
#
# 形式:
#   - name:        フィードの内部名 (ルール側 `lookup:` で参照する name と
#                  同じにしておくと混乱しない)
#     url:         取得先 URL (HTTPS 推奨)
#     parser:      'text' | 'csv' | 'json'
#     column:      csv/json で抽出するカラム名 (text では無視)
#     output:      lookups/ 配下のファイル名
#     lowercase:   true の場合は値を小文字化して書き出す (ハッシュ・URL に有用)
#     min_len:     これ未満の値は破棄 (誤抽出の防止、ハッシュなら 32 など)
#     description: 何のためのフィードか
#     refresh:     推奨更新頻度 (情報用、自動 cron はまだ未実装)
#
# 既存のサンプル (loldrivers_sample.txt 等) はテスト用に残してあるので、
# 実フィードは別名で並存させる。
# ============================================================

feeds:

  - name: loldrivers
    url: https://www.loldrivers.io/api/drivers.csv
    parser: csv
    column: KnownVulnerableSamples_SHA256
    split: ','      # 1 セル内に複数ハッシュをコンマで連結する形式のため
    output: loldrivers.txt
    lowercase: true
    min_len: 64
    description: |
      LOLDrivers プロジェクトの脆弱署名済みドライバ SHA-256 リスト。
      BYOVD (Bring Your Own Vulnerable Driver) 攻撃の検知に使用。
      Sysmon EID 6 (Driver Loaded) の Hashes フィールドと突き合わせる。
    refresh: weekly

  - name: malware_bazaar_sha256
    url: https://bazaar.abuse.ch/export/txt/sha256/recent/
    parser: text
    output: malware_bazaar_sha256.txt
    lowercase: true
    min_len: 64
    skip_prefix: ['#']
    description: |
      abuse.ch MalwareBazaar の直近サンプル SHA-256。
      Sysmon EID 1 (Process Create) や EID 6 の Hashes 突合に使用。
      過去 24 時間ぶんが収載される。
    refresh: hourly

  - name: urlhaus_urls
    url: https://urlhaus.abuse.ch/downloads/text/
    parser: text
    output: urlhaus_urls.txt
    lowercase: true
    min_len: 8
    skip_prefix: ['#']
    description: |
      abuse.ch URLhaus の活動中 malware 配布 URL。
      Sysmon EID 22 (DnsQuery) や EID 3 (NetworkConnection)、
      PowerShell ScriptBlock のテキストと突合する。
    refresh: hourly

  - name: feodo_c2_ips
    url: https://feodotracker.abuse.ch/downloads/ipblocklist.txt
    parser: text
    output: feodo_c2_ips.txt
    lowercase: false
    min_len: 7
    skip_prefix: ['#']
    description: |
      abuse.ch Feodo Tracker の活動中 C2 IP アドレスリスト
      (Emotet / Dridex / TrickBot / QakBot / IcedID 等)。
      Sysmon EID 3 (NetworkConnection) の DestinationIp と突合。
    refresh: hourly
